<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mundial 2026 — Quiniela</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- SheetJS vendored locally — no CDN dependency -->
  <script src="vendor/xlsx.full.min.js"></script>
  <style>
    /* Custom scrollbar for sidebar */
    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-track { background: transparent; }
    #sidebar::-webkit-scrollbar-thumb { background: #16a34a55; border-radius: 9999px; }
    /* Tooltip via title attr is enough for desktop — no JS needed */
  </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col md:flex-row overflow-hidden font-sans">

  <!-- ── Mobile top bar (hidden on desktop) ───────────────────────────────── -->
  <header class="md:hidden flex-shrink-0 bg-green-800 text-white px-4 py-3 flex items-center gap-3 shadow-md">
    <button id="mobile-home-btn" class="flex items-center gap-3 flex-1 min-w-0 text-left cursor-pointer">
      <span class="text-2xl">&#x26BD;</span>
      <div class="min-w-0">
        <p class="text-xs text-green-300 uppercase tracking-widest font-semibold leading-none">Quiniela</p>
        <p class="font-bold text-sm leading-tight">Mundial 2026</p>
      </div>
    </button>
    <select id="mobile-player-select"
            class="bg-green-700 text-white text-sm rounded-lg px-2 py-1.5 border border-green-600 max-w-[160px] truncate">
      <option value="">Participante…</option>
    </select>
  </header>

  <!-- ── Sidebar (desktop only) ───────────────────────────────────────────── -->
  <aside id="sidebar"
         class="hidden md:flex w-64 flex-shrink-0 bg-white border-r border-gray-200 flex-col h-full overflow-y-auto shadow-sm">

    <!-- Logo / header -->
    <button id="desktop-home-btn" class="w-full text-left bg-gradient-to-b from-green-800 to-green-700 px-4 py-4 text-white cursor-pointer hover:from-green-700 hover:to-green-600 transition-colors">
      <div class="flex items-center gap-2 mb-1">
        <span class="text-2xl">&#x26BD;</span>
        <div>
          <p class="text-xs font-semibold text-green-300 uppercase tracking-widest">Quiniela</p>
          <p class="font-extrabold text-base leading-tight">Mundial 2026</p>
        </div>
      </div>
      <p class="text-green-400 text-xs mt-1">Solo fase de grupos</p>
    </button>

    <!-- Participants header -->
    <div class="px-4 py-2 border-b border-gray-100">
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Participantes</p>
    </div>

    <!-- Player list (rendered by ui.js) -->
    <ul id="player-list" class="flex-1 py-1.5 px-2 space-y-0.5">
      <li class="px-4 py-3 text-gray-400 text-sm italic">Cargando…</li>
    </ul>

    <!-- Footer -->
    <div class="border-t border-gray-100 px-4 py-3">
      <p class="text-xs text-gray-400 text-center">
        Bono posiciones: <strong class="text-green-600" id="bonus-label">1 pt</strong> c/posici&#xF3;n correcta
      </p>
    </div>
  </aside>

  <!-- ── Main content ──────────────────────────────────────────────────────── -->
  <main class="flex-1 overflow-y-auto">
    <div id="main-content" class="max-w-4xl mx-auto px-3 md:px-6 py-4 md:py-8">
      <!-- Populated by ui.js -->
    </div>
  </main>

  <!-- Load JS modules -->
  <script type="module" src="js/app.js"></script>
  <script>
    // Patch bonus label once scorer is ready (best-effort)
    document.addEventListener('DOMContentLoaded', () => {
      // Will be set by scorer.js constant — just show default for now
    });
  </script>
</body>
</html>
