services:
  - type: web
    name: mundial-2026-quiniela
    env: static
    staticPublishPath: .
    buildCommand: "python3 update_manifest.py"   # auto-discovers player files on every deploy
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: Cache-Control
        value: "public, max-age=60"   # 1 min cache so Excel updates propagate quickly
