services:
  - type: web
    name: mundial-2026-quiniela
    env: static
    staticPublishPath: .
    buildCommand: "pip install openpyxl && python3 prerender.py"
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: Cache-Control
        value: "public, max-age=60"   # 1 min cache so Excel updates propagate quickly
